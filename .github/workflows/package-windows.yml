name: Package Windows

on:
  workflow_dispatch:

jobs:
  package:
    name: Build VSTO installer
    runs-on: windows-2022

    env:
      Configuration: Release
      ProjectPlatform: AnyCPU
      SolutionPlatform: Any CPU

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Show build tools
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          & $vswhere -products * -format table
          msbuild -version
          nuget help | Select-Object -First 5

      - name: Restore NuGet packages
        run: nuget restore AiHelper.sln

      - name: Build VSTO projects
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build-logs | Out-Null

          function Invoke-ProjectBuild {
            param(
              [Parameter(Mandatory = $true)]
              [string] $ProjectPath,
              [Parameter(Mandatory = $true)]
              [string] $LogName
            )

            $logPath = Join-Path "build-logs" $LogName
            $arguments = @(
              $ProjectPath,
              "/m",
              "/p:Configuration=$env:Configuration",
              "/p:Platform=$env:ProjectPlatform",
              "/bl:build-logs\$($LogName).binlog"
            )

            Write-Host "Building $ProjectPath"
            & msbuild @arguments 2>&1 | Tee-Object -FilePath $logPath

            if ($LASTEXITCODE -ne 0) {
              throw "MSBuild failed for $ProjectPath. See $logPath"
            }
          }

          Invoke-ProjectBuild "ShareRibbon/ShareRibbon.vbproj" "ShareRibbon.log"
          Invoke-ProjectBuild "ExcelAi/ExcelAi.vbproj" "ExcelAi.log"
          Invoke-ProjectBuild "WordAi/WordAi.vbproj" "WordAi.log"
          Invoke-ProjectBuild "PowerPointAi/PowerPointAi.vbproj" "PowerPointAi.log"

      - name: Prepare installer source files
        shell: pwsh
        run: |
          $vdproj = "OfficeAgent\OfficeAgent.vdproj"
          $officeAgentDir = (Resolve-Path "OfficeAgent").Path
          $sourcePathMatches = Select-String -Path $vdproj -Pattern 'SourcePath" = "8:(?<SourcePath>[^"]+)"'
          $createdXmlFiles = @()
          $missingRuntimeFiles = @()

          foreach ($matchInfo in $sourcePathMatches) {
            $sourcePath = $matchInfo.Matches[0].Groups["SourcePath"].Value.Replace("\\", "\")

            if (-not $sourcePath.StartsWith("..\")) {
              continue
            }

            $fullPath = [System.IO.Path]::GetFullPath((Join-Path $officeAgentDir $sourcePath))

            if (Test-Path $fullPath) {
              continue
            }

            if ([System.IO.Path]::GetExtension($fullPath) -ieq ".xml") {
              New-Item -ItemType Directory -Force -Path ([System.IO.Path]::GetDirectoryName($fullPath)) | Out-Null
              Set-Content -Path $fullPath -Encoding UTF8 -Value '<?xml version="1.0" encoding="utf-8"?><doc />'
              $createdXmlFiles += $fullPath
              continue
            }

            $missingRuntimeFiles += $fullPath
          }

          if ($createdXmlFiles.Count -gt 0) {
            Write-Host "Created missing optional XML documentation files:"
            $createdXmlFiles | ForEach-Object { Write-Host "  $_" }
          }

          if ($missingRuntimeFiles.Count -gt 0) {
            Write-Host "Missing non-XML installer source files:"
            $missingRuntimeFiles | ForEach-Object { Write-Host "  $_" }
            throw "Installer source files are missing."
          }

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build-logs | Out-Null

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -requires Component.VSInstallerProjects2022 -property installationPath
          if (-not $vs) {
            throw "Visual Studio Installer Projects support was not found on this runner."
          }

          $devenv = Join-Path $vs "Common7\IDE\devenv.com"
          $disableOutOfProcBuild = Join-Path $vs "Common7\IDE\CommonExtensions\Microsoft\VSI\DisableOutOfProcBuild\DisableOutOfProcBuild.exe"

          if (Test-Path $disableOutOfProcBuild) {
            & $disableOutOfProcBuild
          }

          & $devenv AiHelper.sln /Build "$env:Configuration|$env:SolutionPlatform" /Project OfficeAgent /ProjectConfig "$env:Configuration" /Out "build-logs\devenv-installer.log"

          if ($LASTEXITCODE -ne 0) {
            if (Test-Path "build-logs\devenv-installer.log") {
              Get-Content "build-logs\devenv-installer.log"
            }
            exit $LASTEXITCODE
          }

      - name: Upload package
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OfficeAI-Windows-Package
          if-no-files-found: warn
          path: |
            OfficeAgent/Release/**
            ExcelAi/bin/Release/**
            WordAi/bin/Release/**
            PowerPointAi/bin/Release/**
            build-logs/**
